<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设备信息弹窗</title>
    <style>
        .popup-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            z-index: 99;
            pointer-events: auto;
        }

        .model-card {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 759px;
            height: 500px;
            background: url('./assets/img/modelHtml/1.png') no-repeat center / contain;
        }

        .model-card h2 {
            margin-left: 55px;
            margin-top: 25px;
            font-size: 28px;
            color: #fff;
        }

        .info-list {
            margin-left: 25px;
            margin-top: 30px;
            width: 698px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-item {
            width: 100%;
            height: 50px;
            background: url('./assets/img/modelHtml/2.png') no-repeat center / contain;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 23px 0 15px;
            box-sizing: border-box;
        }

        .info-item span {
            font-size: 24px;
            color: #fff;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="popup-container" id="popupContainer"></div>

    <script>
        // 设备数据（与原逻辑一致）
        const devices = [
            { id: '1', left: '33.33%', number: 'YCZY-1' },
            { id: '2', left: '50%', number: 'YCZY-2' },
            { id: '3', left: '66.66%', number: 'YCZY-3' }
        ];

        // 构建单个卡片的 HTML 片段函数
        const makeCard = (device) => `
    <div class="model-card" style="left:  $ {device.left}">
      <h2>设备信息</h2>
      <div class="info-list">
        <div class="info-item"><span>设备名称</span><span>扬尘噪音</span></div>
        <div class="info-item"><span>设备编号</span><span> $ {device.number}</span></div>
        <div class="info-item"><span>安装位置</span><span>一氧化碳传感器</span></div>
        <div class="info-item"><span>噪音大小</span><span>xxx</span></div>
        <div class="info-item"><span>报警状态</span><span>正常</span></div>
      </div>
    </div>
  `;

        // 拼接所有卡片并一次性插入
        document.getElementById('popupContainer').innerHTML = devices.map(makeCard).join('');
    </script>

</body>

</html>
